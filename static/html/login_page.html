<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/static/styles/login_page.css">
</head>

<body>
    <div class="container" id="container">
        <div class="image-container" id="imageContainer">
            <img src="/static/store_logo.jpeg">
        </div>
        <div class="form-container" id="formContainer">
            <form id="loginForm">
                <h2>Login</h2>
                <input type="text" id="loginUsername" placeholder="USER NAME" required>
                <input type="password" id="loginPassword" placeholder="PASSWORD" required>
                <select id="loginRole" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="admin">Admin</option>
                    <option value="cashier">Cashier</option>
                </select>
                <button class="btn" type="submit">LOGIN</button>
                <div class="links">
                    <p class="toggle-link" onclick="toggleToSignup()">Create an account</p>
                    <p class="toggle-link">Forget password?</p>
                </div>
            </form>

            <form id="signupForm" style="display: none;">
                <h2>Sign Up</h2>
                <input type="text" id="signupUsername" placeholder="USER NAME" required>
                <input type="password" id="signupPassword" placeholder="PASSWORD" required>
                <select id="signupRole" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="admin">Admin</option>
                    <option value="cashier">Cashier</option>
                </select>
                <button class="btn" type="submit">SIGN UP</button>
                <div class="links">
                    <p class="toggle-link" onclick="toggleToLogin()">Already have an account</p>
                </div>
            </form>
        </div>
    </div>

   <script type="text/javascript" src="/static/javascript/login_page.js"></script>
</body>

</html>
